services:
  - type: web
    name: job-finder-backend
    runtime: python
    rootDir: backend
    plan: free
    region: ohio
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: 3.10.12
